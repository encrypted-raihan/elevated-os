<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Elevated Web Solutions Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="background-glow"></div>

<div class="login-container">

    <div class="login-card">

        <div class="logo-wrapper">

<div class="logo">
    <img src="../assets/elevatedlogo.png" alt="Elevated Web Solutions">
</div>

            <h1>Elevated Web Solutions Portal</h1>

            <p>
                Project Management & Client Workspace
            </p>

        </div>

        <form id="loginForm">

            <div class="form-group">

               <label>Email</label>

<input
    type="email"
    id="email"
    placeholder="Enter email"
>

                <small class="error" id="emailError"></small>

            </div>

            <div class="form-group">

                <label>Password</label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter password"
                    >

<button type="button" id="togglePassword" class="password-toggle">

<svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg"
width="18" height="18" viewBox="0 0 24 24"
fill="none" stroke="currentColor"
stroke-width="2" stroke-linecap="round"
stroke-linejoin="round">

<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
<circle cx="12" cy="12" r="3"/>

</svg>

</button>
                </div>

                <small class="error" id="passwordError"></small>

            </div>

<button
    type="submit"
    class="login-btn"
    id="loginBtn"
>
    Sign In
</button>

            <div
                class="login-error"
                id="loginError"
            ></div>

        </form>


    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../shared/js/supabase.js"></script>

<script src="../shared/js/auth.js"></script>

<script src="script.js"></script>
</body>
</html>
